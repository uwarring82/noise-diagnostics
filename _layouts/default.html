<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <style>
    :root{ --ink:#1a1a1a; --muted:#5b6470; --line:#e2e6ea; --accent:#0b6; --bg:#fff; --code:#f5f7f9; --link:#0a58ca; }
    *{box-sizing:border-box}
    html{font-size:17px}
    body{margin:0;color:var(--ink);background:var(--bg);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
      line-height:1.65;-webkit-font-smoothing:antialiased}
    a{color:var(--link);text-decoration:none}
    a:hover{text-decoration:underline}
    .site-header{border-bottom:1px solid var(--line);background:#fafbfc;position:sticky;top:0;z-index:10}
    .bar{max-width:860px;margin:0 auto;padding:.6rem 1.1rem;display:flex;flex-wrap:wrap;gap:.4rem 1rem;align-items:baseline}
    .brand{font-weight:700;color:var(--ink);margin-right:.4rem}
    .site-header nav{display:flex;flex-wrap:wrap;gap:.1rem .9rem;font-size:.9rem}
    .site-header nav a{color:var(--muted)}
    main.content{max-width:860px;margin:0 auto;padding:1.6rem 1.1rem 3rem}
    h1,h2,h3,h4{line-height:1.25;margin:1.8em 0 .6em;font-weight:650}
    h1{font-size:1.9rem;margin-top:.3em}
    h2{font-size:1.45rem;border-bottom:1px solid var(--line);padding-bottom:.25em}
    h3{font-size:1.2rem}
    h4{font-size:1.02rem;color:var(--muted)}
    p,li{overflow-wrap:break-word}
    hr{border:0;border-top:1px solid var(--line);margin:2em 0}
    blockquote{margin:1.2em 0;padding:.2em 1.1em;border-left:3px solid var(--line);color:#39424d}
    code{background:var(--code);padding:.12em .35em;border-radius:4px;font-size:.9em;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    pre{background:var(--code);padding:1em 1.1em;border-radius:8px;overflow-x:auto;line-height:1.45}
    pre code{background:none;padding:0;font-size:.86em}
    .table-wrap, .content > table{display:block;overflow-x:auto}
    table{border-collapse:collapse;width:100%;margin:1.3em 0;font-size:.92rem}
    th,td{border:1px solid var(--line);padding:.5em .7em;text-align:left;vertical-align:top}
    th{background:#f4f6f8;font-weight:650}
    tr:nth-child(even) td{background:#fcfdfe}
    .callout{margin:1.3em 0;padding:.8em 1.1em;border-radius:8px;border:1px solid var(--line);
      border-left-width:4px;background:#f7fbfd}
    .callout-info{border-left-color:#2b8acb;background:#f2f8fd}
    .callout-warning{border-left-color:#e0a800;background:#fffbf0}
    .callout-danger{border-left-color:#d6455d;background:#fdf3f5}
    .callout > :first-child{margin-top:0}.callout > :last-child{margin-bottom:0}
    mjx-container{overflow-x:auto;overflow-y:hidden;max-width:100%}
    mjx-container[display="true"]{margin:.9em 0}
    .site-footer{border-top:1px solid var(--line);background:#fafbfc;color:var(--muted);font-size:.84rem}
    .site-footer .bar{display:block;padding:1.1rem 1.1rem}
  </style>
  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      jax: ["input/TeX","output/CommonHTML"],
      tex2jax: { inlineMath: [], displayMath: [], processEnvironments: true, skipTags: ["script","noscript","style","textarea","pre","code"] },
      TeX: { extensions: ["AMSmath.js","AMSsymbols.js","noErrors.js","noUndefined.js"] },
      "CommonHTML": { linebreaks: { automatic: true } }
    });
  </script>
  <script async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-AMS_CHTML"></script>
</head>
<body>
  <header class="site-header">
    <div class="bar">
      <a class="brand" href="{{ '/' | relative_url }}">Noise Diagnostics</a>
      <nav>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/essays/the-statistical-turn-in-trapped-ion-noise-diagnostics.html' | relative_url }}">Essay</a>
        <a href="{{ '/GLOSSARY.html' | relative_url }}">Glossary</a>
        <a href="{{ '/BIBLIOGRAPHY.html' | relative_url }}">Bibliography</a>
        <a href="{{ '/OUTREACH.html' | relative_url }}">Plain language</a>
        <a href="https://github.com/uwarring82/noise-diagnostics">GitHub</a>
      </nav>
    </div>
  </header>
  <main class="content">
    {{ content }}
  </main>
  <footer class="site-footer">
    <div class="bar">
      A <strong>Sail</strong> under T(h)reehouse +EC stewardship · essay CC BY-NC-SA 4.0 ·
      built against CD 1.8.2. Authority flows from use, not endorsement.
    </div>
  </footer>
</body>
</html>
