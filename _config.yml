# GitHub Pages (Jekyll, deploy-from-branch) configuration.
# Renders the Sail and its FAIR companion documents. Math: kramdown converts $$...$$ to
# MathJax \(...\) (inline) / \[...\] (display) delimiters, rendered by MathJax in the layout.
title: "Noise Diagnostics — The Statistical Turn"
description: "An operational framework (the Decision Engine) for classifying trapped-ion motional noise into three statistical classes."
url: "https://uwarring82.github.io"
baseurl: "/noise-diagnostics"
lang: en

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Only the public-facing documents are part of the site; everything else (tooling,
# assets, provenance, untracked sources, logbook, licences) is excluded.
exclude:
  - tools/
  - assets/SOURCE.md      # serve assets/ (tokens.css, emblem, wordmark) but not its provenance/licence
  - assets/LICENCE
  - docs/
  - archive/
  - logbook/
  - references.bib
  - CITATION.cff
  - LICENCE
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .github/
